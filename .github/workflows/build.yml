name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create base Flutter project
        run: flutter create -t app base_project

      - name: Copy our files into the project
        run: |
          cp lib/main.dart base_project/lib/main.dart
          cp pubspec.yaml base_project/pubspec.yaml

      - name: Install dependencies
        working-directory: base_project
        run: flutter pub get

      - name: Build APK
        working-directory: base_project
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: base_project/build/app/outputs/flutter-apk/app-release.apk
